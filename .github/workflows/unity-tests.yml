name: Unity Tests 🎮

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # =====================================================
  #  Запуск тестов
  # =====================================================
  test:
    name: "${{ matrix.testMode }} Tests"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - playmode
          - editmode

    steps:
      # --- Клонируем репозиторий ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # --- Кеширование Library ---
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      # --- Запуск тестов ---
      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: "${{ matrix.testMode }} Test Results"

      # --- Сохраняем результаты ---
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}
          retention-days: 14

  # =====================================================
  #  Итоговый отчёт
  # =====================================================
  report:
    name: Test Report 📊
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: TestResults

      - name: Summary
        run: |
          echo "## 🎮 Unity Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in TestResults/*/; do
            mode=$(basename "$dir")
            echo "- ✅ **$mode** — completed" >> $GITHUB_STEP_SUMMARY
          done
